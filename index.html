<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDLT & Mortgage Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 2px 2px 12px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        input, button {
            padding: 10px;
            margin: 5px 0;
            width: calc(100% - 22px);
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        h3 {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>Stamp Duty & Mortgage Calculator</h2>

    <label for="propertyPrice">Enter Property Price (£):</label>
    <input type="number" id="propertyPrice" placeholder="Enter amount..." required>

    <div>
        <input type="radio" id="currentRates" name="sdltRates" value="current" checked>
        <label for="currentRates">Current Rates</label>

        <input type="radio" id="april2025Rates" name="sdltRates" value="april2025">
        <label for="april2025Rates">April 2025 Rates</label>
    </div>

    <button onclick="calculateSDLT()">Calculate SDLT</button>
    <h3 id="result">Stamp Duty: £0.00</h3>

    <hr>

    <h2>Mortgage Repayment Calculator</h2>

    <label for="propertyValue">Property Value (£):</label>
    <input type="number" id="propertyValue" placeholder="Enter property value">

    <label for="loanAmount">Loan Amount (£):</label>
    <input type="number" id="loanAmount" placeholder="Enter loan amount">

    <label for="termYears">Term (years):</label>
    <input type="number" id="termYears" placeholder="Enter loan term (years)">

    <label for="interestRate">Interest Rate (%):</label>
    <input type="number" id="interestRate" placeholder="Enter interest rate">

    <button onclick="calculateMortgage()">Calculate Mortgage</button>

    <h3 id="monthlyPayment">Monthly Repayment: £0.00</h3>
    <h3 id="ltvRatio">LTV Ratio: 0%</h3>
    <p id="rateVariations"></p>

    <script>
        function calculateSDLT() {
            let price = parseFloat(document.getElementById("propertyPrice").value);
            let selectedRate = document.querySelector('input[name="sdltRates"]:checked').value;

            if (isNaN(price) || price < 0) {
                alert("Please enter a valid property price.");
                return;
            }

            let rates = selectedRate === "current" ? [
                [250000, 0], 
                [925000, 0.05], 
                [1500000, 0.10], 
                [Infinity, 0.12]
            ] : [
                [125000, 0], 
                [250000, 0.02], 
                [925000, 0.05], 
                [1500000, 0.10], 
                [Infinity, 0.12]
            ];

            let sdlTax = 0;
            let previousLimit = 0;

            for (let i = 0; i < rates.length; i++) {
                let [limit, rate] = rates[i];
                if (price > previousLimit) {
                    let taxableAmount = Math.min(price, limit) - previousLimit;
                    sdlTax += taxableAmount * rate;
                    previousLimit = limit;
                } else {
                    break;
                }
            }

            document.getElementById("result").textContent = `Stamp Duty: £${sdlTax.toFixed(2)}`;
        }

        function calculateMortgage() {
            let propertyValue = parseFloat(document.getElementById("propertyValue").value);
            let loanAmount = parseFloat(document.getElementById("loanAmount").value);
            let termYears = parseFloat(document.getElementById("termYears").value);
            let baseRate = parseFloat(document.getElementById("interestRate").value);

            if (isNaN(propertyValue) || isNaN(loanAmount) || isNaN(termYears) || isNaN(baseRate) ||
                propertyValue <= 0 || loanAmount <= 0 || termYears <= 0 || baseRate < 0) {
                alert("Please enter valid mortgage details.");
                return;
            }

            let ltv = (loanAmount / propertyValue) * 100;

            function calculateMonthlyPayment(rate) {
                let monthlyInterestRate = (rate / 100) / 12;
                let numberOfPayments = termYears * 12;
                if (monthlyInterestRate > 0) {
                    let factor = Math.pow(1 + monthlyInterestRate, numberOfPayments);
                    return loanAmount * (monthlyInterestRate * factor) / (factor - 1);
                } else {
                    return loanAmount / numberOfPayments;
                }
            }

            let baseMonthlyPayment = calculateMonthlyPayment(baseRate);

            let rateIncreases = [1, 3, 5, 7];
            let repaymentList = `Projected Monthly Repayments:<br>
                                 Base Rate (${baseRate}%): £${baseMonthlyPayment.toFixed(2)}<br>`;

            rateIncreases.forEach(increase => {
                let newRate = baseRate + increase;
                let newPayment = calculateMonthlyPayment(newRate);
                repaymentList += `${increase}% increase (${newRate.toFixed(1)}%): £${newPayment.toFixed(2)}<br>`;
            });

            document.getElementById("monthlyPayment").innerHTML = `Monthly Repayment: £${baseMonthlyPayment.toFixed(2)}`;
            document.getElementById("ltvRatio").textContent = `LTV Ratio: ${ltv.toFixed(2)}%`;
            document.getElementById("rateVariations").innerHTML = repaymentList;
        }
    </script>

</body>
</html>
